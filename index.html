
<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD'S BENISON | Moderná školiaca platforma</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Pridanie GSAP cez CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script>
      // Registrácia ScrollTrigger pluginu
      gsap.registerPlugin(ScrollTrigger);
      
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // PRIDANÉ BRAND FARBY PRE LANDING PAGE
              brand: {
                blue: '#004E89',
                orange: '#F7941D',
                gold: '#FFC700',
              },
              // TVOJE PÔVODNÉ KORPORÁTNE FARBY
              corporate: {
                blue: '#1e40af',
                darkblue: '#1e3a8a',
                gray: '#374151',
                lightgray: '#f3f4f6',
                border: '#e5e7eb',
                success: '#059669',
                warning: '#d97706',
                error: '#dc2626'
              },
              neutral: {
                50: '#fafafa', 100: '#f5f5f5', 200: '#e5e5e5', 300: '#d4d4d4',
                400: '#a3a3a3', 500: '#737373', 600: '#525252', 700: '#404040',
                800: '#262626', 900: '#171717', 950: '#0a0a0a'
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
              display: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fade-in 0.5s ease-out',
              'slide-up': 'slide-up 0.4s ease-out',
              'slide-down': 'slide-down 0.4s ease-out',
            },
            keyframes: {
              'fade-in': { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              'slide-up': { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
              'slide-down': { '0%': { transform: 'translateY(-20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
            }
          }
        }
      }
    </script>
    <style>
      /* TVOJE KOMPLETNÉ ŠTÝLY ZOSTÁVAJÚ ZACHOVANÉ */
      body { background-color: #ffffff; color: #171717; -webkit-font-smoothing: antialiased; padding-top: 0; }
      .corporate-card { background: #ffffff; border: 1px solid #e5e7eb; box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1); transition: all 0.2s ease; }
      .corporate-card:hover { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); transform: translateY(-2px); }
      .corporate-button { background: #1e40af; color: #ffffff; padding: 12px 24px; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; }
      .corporate-button:hover { background: #1e3a8a; transform: translateY(-1px); }
      .sidebar-fixed { position: fixed; top: 0; left: 0; height: 100vh; z-index: 50; }
      .main-content-with-sidebar { margin-left: 16rem; min-height: 100vh; }
      
      /* FIX PRE LANDING PAGE KOMPONENTY */
      .main-offer-card { background: rgba(0, 0, 0, 0.3) !important; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
      .animate-on-scroll { opacity: 0; transform: translateY(30px); transition: all 0.8s ease; }
      .animate-on-scroll.animated { opacity: 1; transform: translateY(0); }
      @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
      .pulse-animation { animation: pulse 2s infinite; }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.48.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "path": "https://esm.sh/path@^0.12.7",
    "url": "https://esm.sh/url@^0.11.4",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="root"></div>
    <!-- KNIŽNICE PRE ANIMÁCIE -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script type="module" src="index.tsx"></script>
</body>
</html>

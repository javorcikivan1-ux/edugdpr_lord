      function escapeHtml(text){
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

            html += '<div class="gdprtest-question-title">' + question.id + '. ' + escapeHtml(question.text) + '</div>';

            if(question.type === 'multi'){
              html += '<div class="gdprtest-help">Môže byť správnych viac odpovedí.</div>';
            }

            html += '<div class="gdprtest-answers">';

            question.options.forEach(option => {
              const inputId = 'gdprtest-q' + question.id + '-' + option.key;

              html += '<label class="gdprtest-answer" for="' + inputId + '">';
              html += '<input id="' + inputId + '" type="' + inputType + '" name="q' + question.id + (question.type === 'multi' ? '[]' : '') + '" value="' + escapeHtml(option.key) + '">';
              html += '<span class="gdprtest-answer-text">' + option.key + '. ' + escapeHtml(option.text) + '</span>';
              html += '</label>';
            });

            html += '</div>';
            html += '</div>';
          });
        });

        form.innerHTML = html;
      }

      function arraysEqualAsSets(a, b){
        if(a.length !== b.length) return false;
        const aSorted = [...a].sort();
        const bSorted = [...b].sort();
        return aSorted.every((val, idx) => val === bSorted[idx]);
      }

      function getAllQuestionsFlat(){
        return data.flatMap(section => section.questions);
      }

      function clearWarnings(){
        warningBox.classList.remove('show');
        warningBox.innerHTML = '';
        form.querySelectorAll('.gdprtest-question').forEach(el => {
          el.classList.remove('is-unanswered');
        });
      }

      function evaluateTest(){
        clearWarnings();

        const allQuestions = getAllQuestionsFlat();
        const unanswered = [];
        let correctCount = 0;

        allQuestions.forEach(question => {
          const qEl = form.querySelector('[data-question-id="' + question.id + '"]');
          let selected = [];

          if(question.type === 'multi'){
            const checked = qEl.querySelectorAll('input[type="checkbox"]:checked');
            selected = Array.from(checked).map(el => el.value);
          } else {
            const checked = qEl.querySelector('input[type="radio"]:checked');
            selected = checked ? [checked.value] : [];
          }

          if(selected.length === 0){
            unanswered.push(question.id);
            qEl.classList.add('is-unanswered');
            return;
          }

          if(arraysEqualAsSets(selected, question.correct)){
            correctCount++;
          }
        });

        if(unanswered.length > 0){
          warningBox.classList.add('show');
          warningBox.innerHTML =
            '<strong>Test ešte nie je možné vyhodnotiť.</strong><br>' +
            'Prosím, odpovedzte na všetky otázky.' +
            '<div class="gdprtest-unanswered">Nezodpovedané otázky: ' + unanswered.join(', ') + '</div>';

          resultBox.classList.remove('show');
          resultBox.innerHTML = '';
          return;
        }

        const total = allQuestions.length;
        const wrongCount = total - correctCount;
        const percent = Math.round((correctCount / total) * 100);

        let verdict = '';
        if(percent >= 80){
          verdict = 'Test ste úspešne absolvovali.';
        } else {
          verdict = 'Test ste neabsolvovali úspešne. Odporúčame prejsť si školenie ešte raz a test zopakovať.';
        }

        resultBox.innerHTML =
          '<div class="gdprtest-result-title">Výsledok</div>' +
          '<div class="gdprtest-result-line"><strong>Celkom:</strong> 49 otázok</div>' +
          '<div class="gdprtest-result-line"><strong>Správne odpovede:</strong> ' + correctCount + '</div>' +
          '<div class="gdprtest-result-line"><strong>Nesprávne odpovede:</strong> ' + wrongCount + '</div>' +
          '<div class="gdprtest-result-line"><strong>Úspešnosť:</strong> ' + percent + ' %</div>' +
          '<div class="gdprtest-result-line"><strong>Vyhodnotenie:</strong> ' + verdict + '</div>' +
          '<div class="gdprtest-summary">Pokrytie: 100 % obsahu školenia</div>';

        resultBox.classList.add('show');
        resultBox.scrollIntoView({ behavior:'smooth', block:'nearest' });
      }

      function resetTest(){
        form.reset();
        clearWarnings();
        resultBox.classList.remove('show');
        resultBox.innerHTML = '';
      }

      renderTest();
      evaluateBtn.addEventListener('click', evaluateTest);
      resetBtn.addEventListener('click', resetTest);
      
      // Spustenie aj po načítaní DOM, ak sa ešte nespustilo
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', renderTest);
      } else {
        // Ak je DOM už načítaný, skúste spustiť s malým oneskorením
        setTimeout(renderTest, 100);
      }
    })();
  </script>
</div>
